spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false   # Disable Flyway for tests (Hibernate will create schema from entities)

# Missing placeholders for tests
BREVO_HOST=localhost
BREVO_USERNAME=test
BREVO_PASSWORD=test
BREVO_MAIL=test@test.com
JWT_SECRET=test_secret_32_characters_long_minimum_for_security
OAUTH2_ID=test_id
OAUTH2_SECRET=test_secret
DB_USERNAME=sa
DB_PASSWORD=
