# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/travel_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${POSTGRES_PASSWORD:${DB_PASSWORD}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA : switched to validate to prevent filghting flyway o it's own and change schema which breaks migrations and auditability now it's controlled by flyway migration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-migration-naming=true
spring.flyway.repair-on-migrate=true

# Server
server.port=${PORT:8081}

# Max request size for base64 videos (JSON bodies)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
server.tomcat.max-swallow-size=-1
server.tomcat.max-http-form-post-size=-1


# Logging
logging.level.org.hibernate.SQL=DEBUG
# less noisy than trace for normal development
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=DEBUG

# JWT
jwt.secret=${JWT_SECRET}
# 24 hours in milliseconds 900000 for normal setup
jwt.expiration=900000

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${OAUTH2_ID}
spring.security.oauth2.client.registration.google.client-secret=${OAUTH2_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Where backend redirects after OAuth success (your Next.js route)
app.oauth2.frontend-redirect=${FRONTEND_URL:http://localhost:3000}/auth/oauth-callback

# Email verification
app.email-verification.ttl-minutes=30
# Dev mode: return token/code in API response so you can test without sending emails.
# Set false later when you integrate real email sending.
app.email-verification.dev-return=false
app.password-reset.dev-return=false

# Brevo SMTP (Transactional)
spring.mail.host=${BREVO_HOST}
spring.mail.port=587
spring.mail.username=${BREVO_USERNAME}
spring.mail.password=${BREVO_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Your app settings
app.mail.from=${BREVO_MAIL}
app.frontend.base-url=${FRONTEND_URL:http://localhost:3000}

# ── Stripe Payment ────────────────────────────────────────────────────────────
# Get your test keys from: https://dashboard.stripe.com/test/apikeys (free signup)
# Publishable key starts with pk_test_... (not used by backend, only frontend)
# Secret key starts with sk_test_... (used by StripePaymentService)
stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_replace_me}

# Webhook signing secret — get this from:
#   Option A (Stripe CLI):  stripe listen --forward-to localhost:8081/api/payments/webhook
#                           → CLI prints "Your webhook signing secret is whsec_..."
#   Option B (Dashboard):   Dashboard → Developers → Webhooks → Add endpoint
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:whsec_replace_me}

# Mock mode: true  = no real Stripe calls (demo/Lebanon mode)
#             false = real Stripe API (production, requires valid keys above)
stripe.mock-mode=true

# ── Payout Freeze Window ──────────────────────────────────────────────────────
# How many hours to hold funds after tour completion before releasing to guide.
# Production: 48 (gives time to handle disputes)
# Demo / test: 0 (instant release — set this to demo the full escrow flow live)
app.payout.freeze-hours=0

# ── Loyalty System ────────────────────────────────────────────────────────────
# Tier thresholds: minimum number of COMPLETED bookings required to hold each tier.
# Travelers auto-uprade when they cross these thresholds.
app.loyalty.silver-min-trips=5
app.loyalty.gold-min-trips=10

# Discount percentages applied to finalPrice at booking time (whole numbers = %).
# Set bronze to 0 to give no discount to new travelers (default behavior).
app.loyalty.bronze-discount-pct=0
app.loyalty.silver-discount-pct=5
app.loyalty.gold-discount-pct=10

# Base platform commission rate (%) before any per-guide multiplier is applied.
# A guide with currentFeeMultiplier = 0.90 will pay: 10 * 0.90 = 9% commission.
app.loyalty.platform-fee-rate=10

# ── Cloudinary Direct Upload ──────────────────────────────────────────────────
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}